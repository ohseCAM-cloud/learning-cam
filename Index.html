<style>
  *{ -webkit-font-smoothing:antialiased; }
  body{ font-family:'Inter',sans-serif; background:#f4f1ee; color:#1b1817; }
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:#d6cfca; border-radius:20px; border:2px solid #f4f1ee; }
  ::-webkit-scrollbar-thumb:hover{ background:#b9b0a9; }
  .brand-gradient{ background:linear-gradient(120deg,#1b1817 0%,#3a2a26 45%,#7a2118 78%,#b41a12 100%); }
  .red-orange{ background:linear-gradient(135deg,#e1251b 0%,#f5921f 100%); }
  .glass{ background:rgba(255,255,255,.08); backdrop-filter:blur(10px); }
  .text-shadow{ text-shadow:0 2px 18px rgba(0,0,0,.35); }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes pop{ 0%{transform:scale(.96); opacity:0;} 100%{transform:scale(1); opacity:1;} }
  @keyframes shimmer{ 100%{ transform:translateX(100%);} }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  @keyframes floaty{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-6px);} }
  .animate-fadeUp{ animation:fadeUp .5s cubic-bezier(.21,.6,.35,1) both; }
  .animate-fadeIn{ animation:fadeIn .4s ease both; }
  .animate-pop{ animation:pop .35s cubic-bezier(.21,.6,.35,1) both; }
  .spin{ animation:spin .8s linear infinite; }
  .floaty{ animation:floaty 5s ease-in-out infinite; }
  .skeleton{ position:relative; overflow:hidden; background:#e9e4df; }
  .skeleton::after{ content:''; position:absolute; inset:0; transform:translateX(-100%);
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent); animation:shimmer 1.4s infinite; }
  .nav-active{ background:linear-gradient(135deg,rgba(225,37,27,.16),rgba(245,146,31,.16)); color:#fff; }
  .card-hover{ transition:transform .25s cubic-bezier(.21,.6,.35,1), box-shadow .25s; }
  .card-hover:hover{ transform:translateY(-4px); }
  details>summary{ list-style:none; } details>summary::-webkit-details-marker{ display:none; }
  input,select,textarea{ outline:none; }
  .ring-focus:focus{ box-shadow:0 0 0 3px rgba(245,146,31,.35); border-color:#f5921f; }
  .clamp-2{ display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .clamp-1{ display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; }
</style>

function toast(msg, type='info'){
  const root=document.getElementById('toast-root'); if(!root) return;
  const colors={info:'#26201f',success:'#15803d',error:'#b41a12',warn:'#b45309'};
  const el=document.createElement('div');
  el.style.cssText=`min-width:240px;max-width:360px;background:${colors[type]||colors.info};color:#fff;padding:12px 14px;border-radius:12px;box-shadow:0 10px 30px -8px rgba(0,0,0,.4);font-size:13.5px;font-weight:500;animation:fadeUp .3s ease both;display:flex;gap:10px;align-items:flex-start`;
  el.innerHTML=`<span style="flex-shrink:0;margin-top:1px">${type==='success'?'✓':type==='error'?'✕':type==='warn'?'⚠':'ℹ'}</span><span>${msg}</span>`;
  root.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s, transform .3s'; el.style.opacity='0'; el.style.transform='translateY(8px)'; setTimeout(()=>el.remove(),300); }, 3600);
}

/* ============================ AI HELPER ============================ */
async function callClaude({ system, prompt, max_tokens=1400 }){
  const key = ls.get('cam_ai_key','');
  const model = ls.get('cam_ai_model','claude-sonnet-4-6');
  const headers = { 'Content-Type':'application/json' };
  if(key){ headers['x-api-key']=key; headers['anthropic-version']='2023-06-01'; headers['anthropic-dangerous-direct-browser-access']='true'; }
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers,
    body: JSON.stringify({ model, max_tokens, system, messages:[{ role:'user', content:prompt }] })
  });
  if(!res.ok){ const t=await res.text().catch(()=> ''); throw new Error('HTTP '+res.status+' — '+t.slice(0,160)); }
  const data = await res.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
}

let _logoImg = null;
function loadLogo(){ return new Promise(res=>{ if(_logoImg) return res(_logoImg); const im=new Image(); im.onload=()=>{_logoImg=im;res(im);}; im.onerror=()=>res(null); im.src=CAM_LOGO; }); }
const scoreLabel = (s)=> s>=90?'Sangat Baik':s>=80?'Baik':s>=70?'Cukup':'Lulus';

async function makeCertificate(o){
  try{ await Promise.all([
    document.fonts.load("800 72px 'Playfair Display'"),
    document.fonts.load("700 58px 'Playfair Display'"),
    document.fonts.load("italic 700 40px 'Playfair Display'"),
    document.fonts.load("700 52px 'Dancing Script'"),
    document.fonts.load("700 22px 'Inter'"), document.fonts.load("600 20px 'Inter'"),
  ]); }catch(e){}
  const logo = await loadLogo();
  const W=1600, H=1131, cx=W/2;
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const x=c.getContext('2d');
  // background
  const bg=x.createLinearGradient(0,0,W,H); bg.addColorStop(0,'#fffdf8'); bg.addColorStop(1,'#fdf4ea');
  x.fillStyle=bg; x.fillRect(0,0,W,H);
  // faint corner blooms
  const bloom=(px,py,col)=>{ const g=x.createRadialGradient(px,py,0,px,py,420); g.addColorStop(0,col); g.addColorStop(1,'rgba(255,255,255,0)'); x.fillStyle=g; x.fillRect(px-420,py-420,840,840); };
  bloom(0,0,'rgba(245,146,31,.14)'); bloom(W,H,'rgba(225,37,27,.12)');
  // frames
  x.strokeStyle='#e1251b'; x.lineWidth=10; x.strokeRect(34,34,W-68,H-68);
  x.strokeStyle='#f5921f'; x.lineWidth=3; x.strokeRect(54,54,W-108,H-108);
  // corner ornaments
  x.strokeStyle='#b41a12'; x.lineWidth=5;
  const corner=(ox,oy,sx,sy)=>{ x.beginPath(); x.moveTo(ox,oy+sy*70); x.lineTo(ox,oy); x.lineTo(ox+sx*70,oy); x.stroke();
    x.beginPath(); x.arc(ox+sx*26,oy+sy*26,9,0,7); x.fillStyle='#f5921f'; x.fill(); };
  corner(80,80,1,1); corner(W-80,80,-1,1); corner(80,H-80,1,-1); corner(W-80,H-80,-1,-1);
  // logo
  if(logo){ const lw=360, lh=lw*logo.height/logo.width; x.drawImage(logo,cx-lw/2,92,lw,lh); }
  x.textAlign='center'; x.fillStyle='#8a8079';
  x.font="600 19px 'Inter'"; x.fillText('PT CEMERLANG ASA MANDIRI  •  MINING LEARNING CENTER', cx, 210);
  // title
  x.fillStyle='#1b1817'; x.font="800 72px 'Playfair Display'";
  x.fillText('SERTIFIKAT', cx, 300);
  x.fillStyle='#e1251b'; x.font="700 22px 'Inter'";
  x.fillText('P E N Y E L E S A I A N   P E L A T I H A N', cx, 338);
  // divider
  x.strokeStyle='#f5921f'; x.lineWidth=2; x.beginPath(); x.moveTo(cx-120,360); x.lineTo(cx+120,360); x.stroke();
  x.fillStyle='#f5921f'; x.beginPath(); x.arc(cx,360,5,0,7); x.fill();
  // body
  x.fillStyle='#6b625b'; x.font="500 22px 'Inter'"; x.fillText('Dengan ini dinyatakan bahwa:', cx, 410);
  x.fillStyle='#b41a12'; x.font="700 58px 'Playfair Display'"; x.fillText(o.recipient||'-', cx, 478);
  // underline
  const nameW=Math.min(680, x.measureText(o.recipient||'-').width+80);
  x.strokeStyle='#e9ddd2'; x.lineWidth=2; x.beginPath(); x.moveTo(cx-nameW/2,500); x.lineTo(cx+nameW/2,500); x.stroke();
  x.fillStyle='#6b625b'; x.font="500 21px 'Inter'"; x.fillText('telah menyelesaikan dan dinyatakan LULUS dalam pelatihan', cx, 548);
  x.fillStyle='#1b1817'; x.font="italic 700 40px 'Playfair Display'";
  const title=o.course||'-'; x.fillText(title.length>52?title.slice(0,51)+'…':title, cx, 606);
  // score pill
  const lbl=`Nilai Akhir  ${o.score}/100  •  ${scoreLabel(o.score)}`;
  x.font="700 20px 'Inter'"; const pw=x.measureText(lbl).width+56;
  const px=cx-pw/2, py=646; const r=22;
  const grad=x.createLinearGradient(px,0,px+pw,0); grad.addColorStop(0,'#e1251b'); grad.addColorStop(1,'#f5921f');
  x.fillStyle=grad; x.beginPath();
  x.moveTo(px+r,py); x.arcTo(px+pw,py,px+pw,py+44,r); x.arcTo(px+pw,py+44,px,py+44,r); x.arcTo(px,py+44,px,py,r); x.arcTo(px,py,px+pw,py,r); x.closePath(); x.fill();
  x.fillStyle='#fff'; x.fillText(lbl, cx, py+29);
  // seal medallion (left-bottom)
  const sx=300, sy=860;
  x.beginPath(); x.arc(sx,sy,72,0,7); x.fillStyle='#fdf4ea'; x.fill();
  x.lineWidth=6; x.strokeStyle='#e1251b'; x.beginPath(); x.arc(sx,sy,72,0,7); x.stroke();
  x.lineWidth=2; x.strokeStyle='#f5921f'; x.beginPath(); x.arc(sx,sy,58,0,7); x.stroke();
  x.fillStyle='#b41a12'; x.font="800 26px 'Playfair Display'"; x.fillText('CAM', sx, sy-4);
  x.fillStyle='#8a8079'; x.font="700 10px 'Inter'"; x.fillText('TERVERIFIKASI', sx, sy+16);
  // star ring
  for(let i=0;i<12;i++){ const a=i/12*Math.PI*2; x.beginPath(); x.arc(sx+Math.cos(a)*66,sy+Math.sin(a)*66,2.3,0,7); x.fillStyle='#f5921f'; x.fill(); }
  // signature block (right-bottom)
  const rx=1180;
  x.textAlign='center'; x.fillStyle='#6b625b'; x.font="500 19px 'Inter'";
  x.fillText('Disahkan oleh,', rx, 800);
  x.fillStyle='#1b1817'; x.font="700 52px 'Dancing Script'"; x.fillText(o.ktt||'Adi Rachmani', rx, 866);
  x.strokeStyle='#1b1817'; x.lineWidth=1.5; x.beginPath(); x.moveTo(rx-150,884); x.lineTo(rx+150,884); x.stroke();
  x.fillStyle='#1b1817'; x.font="700 22px 'Inter'"; x.fillText(o.ktt||'Adi Rachmani', rx, 914);
  x.fillStyle='#6b625b'; x.font="500 17px 'Inter'"; x.fillText(o.kttTitle||'Kepala Teknik Tambang PT CAM', rx, 940);
  // meta left-bottom
  x.textAlign='left'; x.fillStyle='#8a8079'; x.font="600 16px 'Inter'";
  x.fillText('No. Sertifikat', 110, 980);
  x.fillText('Tanggal Terbit', 110, 1006);
  x.fillText('Berlaku Hingga', 110, 1032);
  x.fillStyle='#1b1817'; x.font="700 16px 'Inter'";
  x.fillText(': '+(o.certNo||'-'), 250, 980);
  x.fillText(': '+fmtDate(o.issued), 250, 1006);
  x.fillText(': '+(o.valid?fmtDate(o.valid):'Seumur hidup'), 250, 1032);
  // footer note
  x.textAlign='center'; x.fillStyle='#b9aea4'; x.font="500 13px 'Inter'";
  x.fillText('Sertifikat ini diterbitkan secara digital oleh CAM Learning Center dan sah tanpa tanda tangan basah.', cx, 1075);
  return c;
}
function downloadCanvasPNG(canvas, filename){ const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download=filename; a.click(); }
function downloadCanvasPDF(canvas, filename){
  try{
    const { jsPDF } = window.jspdf; const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,297,210); pdf.save(filename);
  }catch(e){ toast('Gagal membuat PDF, mengunduh PNG.','warn'); downloadCanvasPNG(canvas, filename.replace('.pdf','.png')); }
}

function Login(){
  const [mode,setMode]=useState('login');
  const [f,setF]=useState({ email:'', password:'', name:'', employee_id:'', position:'', department:'' });
  const [busy,setBusy]=useState(false);
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const fill=(d)=>{ setMode('login'); setF(s=>({...s,email:d.email,password:d.pass})); };

  async function submit(e){
    e&&e.preventDefault(); setBusy(true);
    try{
      if(mode==='login'){
        const { error } = await sb.auth.signInWithPassword({ email:f.email.trim(), password:f.password });
        if(error) throw error;
        toast('Selamat datang kembali!','success');
      } else {
        const { data, error } = await sb.auth.signUp({ email:f.email.trim(), password:f.password, options:{ data:{ name:f.name } } });
        if(error) throw error;
        if(data.session){
          await sb.from('profiles').update({ name:f.name, employee_id:f.employee_id, position:f.position, department:f.department }).eq('id', data.user.id);
          toast('Akun berhasil dibuat!','success');
        } else {
          toast('Akun dibuat. Perlu konfirmasi email sebelum login — atau gunakan akun demo.','warn'); setMode('login');
        }
      }
    }catch(err){ toast(err.message||'Gagal masuk','error'); }
    setBusy(false);
  }

  return <div className="min-h-screen grid lg:grid-cols-2">
    {/* hero */}
    <div className="relative brand-gradient text-white overflow-hidden hidden lg:flex flex-col justify-between p-12">

        <div className="bg-white rounded-2xl px-4 py-3 inline-flex shadow-lg"><Logo h={40}/></div>

          <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full glass text-xs font-semibold tracking-wide"><Icon name="flame" size={14} className="text-cam-orange"/> SAFETY-FIRST MINING TRAINING</div>
          <h1 className="font-display text-5xl font-extrabold leading-tight mt-5 text-shadow">CAM Learning<br/>Center</h1>
          <p className="text-white/80 mt-4 text-[15px] leading-relaxed">Platform pelatihan & sertifikasi terpadu PT Cemerlang Asa Mandiri — prosedur, materi, video, kuis, evaluasi, hingga sertifikat resmi yang disahkan Kepala Teknik Tambang.</p>
        </div>
      </div>
      <div className="relative grid grid-cols-2 gap-3 max-w-md">
        {[['grad','Pelatihan & Modul'],['layers','Materi PPTX & Video'],['shield','Prosedur (SOP) K3'],['award','Sertifikat Digital']].map(([i,t])=>(
          <div key={t} className="flex items-center gap-3 glass rounded-xl px-4 py-3">

/* ============================ QUIZ MODAL ============================ */
function QuizModal({ quiz, userId, onClose, onDone }){
  const qs=[...(quiz.quiz_questions||[])].sort((a,b)=>a.position-b.position);
  const [i,setI]=useState(0); const [ans,setAns]=useState({}); const [res,setRes]=useState(null); const [busy,setBusy]=useState(false);
  const q=qs[i]; const answered=qs.every(x=>ans[x.id]!=null);
  async function submit(){
    let correct=0; qs.forEach(x=>{ if(ans[x.id]===x.correct_index) correct++; });
    const score=Math.round(correct/qs.length*100), passed=score>=(quiz.pass_score||70);
    setBusy(true);
    try{ await sb.from('quiz_attempts').insert({ user_id:userId, quiz_id:quiz.id, score, passed }); }catch(e){}
    setBusy(false); setRes({score,passed,correct,total:qs.length}); onDone&&onDone();
  }
  if(qs.length===0) return <Modal open onClose={onClose} title={quiz.title} icon="clip"><Empty icon="clip" title="Belum ada soal"/></Modal>;
  return <Modal open onClose={onClose} title={quiz.title} icon="clip" size="md">
    {res ? <div className="text-center py-4">
      <div className={cls('w-24 h-24 rounded-full grid place-items-center mx-auto', res.passed?'bg-green-100':'bg-red-100')}>
        <Icon name={res.passed?'checkC':'x'} size={52} className={res.passed?'text-green-600':'text-red-500'}/></div>
      <div className="text-3xl font-extrabold text-cam-ink mt-4">{res.score}<span className="text-lg text-stone-400">/100</span></div>
      <Badge color={res.passed?'green':'red'} className="mt-2">{res.passed?'LULUS':'BELUM LULUS'}</Badge>
      <p className="text-stone-500 text-sm mt-3">Jawaban benar {res.correct} dari {res.total} soal · Nilai minimum {quiz.pass_score}</p>
      <div className="flex gap-2 justify-center mt-5"><Btn variant="outline" onClick={()=>{setRes(null);setAns({});setI(0);}}>Ulangi</Btn><Btn onClick={onClose}>Selesai</Btn></div>
    </div> : <div>
      <div className="flex items-center gap-2 mb-4"><Progress value={(i+1)/qs.length*100}/><span className="text-xs font-bold text-stone-400 shrink-0">{i+1}/{qs.length}</span></div>
      <div className="font-bold text-cam-ink text-[16px] leading-snug mb-4">{q.question}</div>
      <div className="space-y-2.5">
        {(q.options||[]).map((opt,idx)=>{ const sel=ans[q.id]===idx;
          return <button key={idx} onClick={()=>setAns(s=>({...s,[q.id]:idx}))}
            className={cls('w-full text-left px-4 py-3 rounded-xl border-2 transition flex items-center gap-3',sel?'border-cam-orange bg-cam-orangeSoft':'border-stone-200 hover:border-stone-300 bg-white')}>
            <span className={cls('w-6 h-6 rounded-full grid place-items-center text-xs font-bold shrink-0',sel?'red-orange text-white':'bg-stone-100 text-stone-400')}>{String.fromCharCode(65+idx)}</span>
            <span className="text-[14px] font-medium text-cam-ink">{opt}</span></button>; })}
      </div>
      <div className="flex items-center justify-between mt-5">
        <Btn variant="ghost" disabled={i===0} onClick={()=>setI(i-1)} icon="chevR" className="!flex-row-reverse">Sebelumnya</Btn>
        {i<qs.length-1 ? <Btn onClick={()=>setI(i+1)} disabled={ans[q.id]==null}>Lanjut <Icon name="chevR" size={16}/></Btn>
          : <Btn onClick={submit} loading={busy} disabled={!answered} icon="check">Kumpulkan</Btn>}
      </div>
    </div>}
  </Modal>;
}

      sb.from('enrollments').select('*').eq('user_id',profile.id).eq('course_id',courseId).maybeSingle(),
      sb.from('module_completions').select('*').eq('user_id',profile.id),
      sb.from('quiz_attempts').select('*').eq('user_id',profile.id),
    ]);
    setData({ course, modules:modules||[], materials:matsR.data||[], quizzes:quizR.data||[], enrollment:enrR.data,
      completions:(compR.data||[]).filter(c=>modIds.includes(c.module_id)), attempts:attR.data||[] });
    setLoading(false);
  },[courseId,profile.id]);
  useEffect(()=>{ setLoading(true); load(); },[load]);

  if(loading) return <div className="space-y-4"><div className="skeleton h-56 rounded-3xl"/><div className="grid lg:grid-cols-3 gap-5"><div className="lg:col-span-2 skeleton h-96 rounded-2xl"/><div className="skeleton h-96 rounded-2xl"/></div></div>;
  if(!data?.course) return <Empty icon="grad" title="Pelatihan tidak ditemukan"/>;
  const { course, modules, materials, quizzes, enrollment, completions, attempts } = data;
  const compIds=new Set(completions.map(c=>c.module_id));
  const total=modules.length||1; const done=modules.filter(m=>compIds.has(m.id)).length;
  const progress=Math.round(done/total*100);
  const matByModule=(mid)=>materials.filter(m=>m.module_id===mid);
  const courseMatsNoModule=materials.filter(m=>!m.module_id);
  const quizByModule=(mid)=>quizzes.filter(q=>q.module_id===mid);
  const lastAttempt=(qid)=>attempts.filter(a=>a.quiz_id===qid).sort((a,b)=>new Date(b.attempted_at)-new Date(a.attempted_at))[0];

  async function enroll(){
    setBusy(true);
    const { error } = await sb.from('enrollments').insert({ user_id:profile.id, course_id:courseId, progress:0, status:'ongoing' });
    if(error) toast(error.message,'error'); else { toast('Berhasil mendaftar pelatihan!','success'); await load(); }
    setBusy(false);
  }
  async function toggleModule(mod){
    if(!enrollment){ toast('Daftar pelatihan terlebih dahulu.','warn'); return; }
    const isDone=compIds.has(mod.id);
    if(isDone){ await sb.from('module_completions').delete().eq('user_id',profile.id).eq('module_id',mod.id); }
    else { await sb.from('module_completions').insert({ user_id:profile.id, module_id:mod.id }); }
    const newDone=isDone?done-1:done+1; const newProg=Math.round(newDone/total*100);
    const newStatus=newProg>=100?'finished':'ongoing';
    await sb.from('enrollments').update({ progress:newProg, status:newStatus }).eq('id',enrollment.id);
    if(newStatus==='finished' && enrollment.status!=='finished'){ setJustFinished(true); toast('🎉 Pelatihan selesai! Sertifikat tersedia.','success'); }
    await load();
  }

  return <div className="space-y-6">
    <button onClick={()=>go('courses')} className="text-sm font-semibold text-stone-500 hover:text-cam-redDark flex items-center gap-1.5"><Icon name="chevR" size={16} className="rotate-180"/> Kembali ke Katalog</button>
    {/* hero */}
    <div className="relative overflow-hidden rounded-3xl text-white animate-fadeUp" style={{minHeight:240}}>
      <div className="absolute inset-0 bg-cover bg-center" style={{backgroundImage:`url(${course.image_url})`}}/>
      <div className="absolute inset-0 brand-gradient opacity-90"/>
      <div className="relative p-7 sm:p-9 flex flex-col h-full justify-end" style={{minHeight:240}}>
        <div className="flex items-center gap-2 mb-2">{course.is_new&&<Badge color="red">Baru</Badge>}<Badge className="!bg-white/15 !text-white backdrop-blur">{course.category}</Badge></div>
        <h1 className="font-display text-3xl sm:text-4xl font-extrabold leading-tight max-w-2xl">{course.title}</h1>
        <p className="text-white/80 mt-2 max-w-2xl text-[15px]">{course.description}</p>
        <div className="flex flex-wrap items-center gap-5 mt-5">
          <span className="flex items-center gap-2 text-sm font-medium"><Icon name="layers" size={17} className="text-cam-orange"/> {modules.length} Modul</span>
          <span className="flex items-center gap-2 text-sm font-medium"><Icon name="clip" size={17} className="text-cam-orange"/> {quizzes.length} Kuis</span>
          <span className="flex items-center gap-2 text-sm font-medium"><Icon name="file" size={17} className="text-cam-orange"/> {materials.length} Materi</span>
        </div>
      </div>
    </div>

    {/* progress / enroll bar */}
    <Card className="!py-4">
      {!enrollment ? <div className="flex flex-col sm:flex-row items-center gap-4 justify-between">
        <div><div className="font-bold text-cam-ink">Siap memulai pelatihan ini?</div><div className="text-sm text-stone-400">Daftar untuk membuka modul, materi, dan kuis.</div></div>
        <Btn size="lg" icon="grad" loading={busy} onClick={enroll}>Daftar Sekarang</Btn>
      </div> : <div className="flex flex-col sm:flex-row items-center gap-4">
        <div className="flex-1 w-full">
          <div className="flex items-center justify-between mb-1.5"><span className="text-sm font-bold text-cam-ink">Progres Belajar</span>
            <span className="text-sm font-bold text-cam-redDark">{progress}% · {done}/{total} modul</span></div>
          <Progress value={progress} h={10}/>
        </div>
        {(enrollment.status==='finished'||progress>=100) ? <Btn size="lg" variant="primary" icon="award" onClick={()=>go('certificates')}>Cetak Sertifikat</Btn>
          : <Badge color="orange" className="!px-4 !py-2.5">Sedang Berjalan</Badge>}
      </div>}
    </Card>

    {justFinished && <Card className="!bg-gradient-to-r from-green-50 to-emerald-50 border-green-200 animate-pop">
      <div className="flex items-center gap-4"><div className="w-14 h-14 rounded-2xl bg-green-500 grid place-items-center shrink-0"><Icon name="award" size={28} className="text-white"/></div>
        <div className="flex-1"><div className="font-bold text-green-800">Selamat! Anda telah menyelesaikan pelatihan ini 🎉</div><div className="text-sm text-green-600">Sertifikat resmi bertanda tangan KTT siap dicetak.</div></div>
        <Btn variant="primary" icon="award" onClick={()=>go('certificates')}>Ke Sertifikat</Btn></div></Card>}

    <div className="grid lg:grid-cols-3 gap-6">
      {/* modules */}
      <div className="lg:col-span-2 space-y-3">
        <h2 className="font-bold text-lg text-cam-ink">Modul Pembelajaran</h2>
        {modules.length===0 ? <Card><Empty icon="layers" title="Belum ada modul"/></Card> :

          return <Card key={m.id} className="!p-0 overflow-hidden">

        </Card>}
        <Card>
          <div className="font-bold text-cam-ink mb-3">Informasi</div>
          <div className="space-y-3 text-sm">
            {[['layers','Jumlah Modul',modules.length],['clip','Total Kuis',quizzes.length],['file','Materi & Video',materials.length],['shield','Kategori',course.category]].map(([ic,l,v])=>(
              <div key={l} className="flex items-center gap-3"><div className="w-8 h-8 rounded-lg bg-stone-100 grid place-items-center text-stone-400 shrink-0"><Icon name={ic} size={16}/></div>

        </Card>

    {viewMat && <MaterialViewer mat={viewMat} onClose={()=>setViewMat(null)}/>}

/* ============================ CERTIFICATE PREVIEW ============================ */
function CertPreview({ cert, onClose }){
  const [url,setUrl]=useState(null); const canvasRef=useRef(null);
  useEffect(()=>{ let ok=true; (async()=>{
    const c=await makeCertificate({ recipient:cert.recipient_name, course:cert.course_title, certNo:cert.certificate_number,
      score:cert.final_score, issued:cert.issued_at, valid:cert.valid_until, ktt:cert.signed_by_name, kttTitle:cert.signed_by_title });
    if(!ok) return; canvasRef.current=c; setUrl(c.toDataURL('image/png'));
  })(); return ()=>{ok=false;}; },[cert]);
  const fn=`Sertifikat_${(cert.recipient_name||'').replace(/\s+/g,'_')}_${(cert.course_title||'').replace(/\s+/g,'_')}`;
  return <Modal open onClose={onClose} title="Sertifikat" icon="award" size="lg">
    {!url ? <div className="aspect-[1600/1131] skeleton rounded-xl grid place-items-center"><Spinner size={28}/></div> :
      <img src={url} alt="Sertifikat" className="w-full rounded-xl shadow-card border border-stone-100"/>}
    <div className="mt-4 flex flex-wrap gap-2">
      <Btn icon="download" disabled={!url} onClick={()=>downloadCanvasPDF(canvasRef.current,fn+'.pdf')}>Unduh PDF</Btn>
      <Btn variant="outline" icon="download" disabled={!url} onClick={()=>downloadCanvasPNG(canvasRef.current,fn+'.png')}>Unduh PNG</Btn>
      <div className="ml-auto flex items-center gap-2 text-sm text-stone-400"><Icon name="lock" size={15}/> No: <span className="font-mono font-semibold text-cam-ink">{cert.certificate_number}</span></div>
    </div>
  </Modal>;
}

/* ============================ CERTIFICATES PAGE ============================ */
function Certificates(){
  const { profile } = useApp();
  const [certs,setCerts]=useState([]); const [finished,setFinished]=useState([]); const [loading,setLoading]=useState(true);
  const [preview,setPreview]=useState(null); const [busyId,setBusyId]=useState(null);
  const load=useCallback(async()=>{
    const [c,e]=await Promise.all([
      sb.from('certificates').select('*, courses(image_url,category)').eq('user_id',profile.id).order('issued_at',{ascending:false}),
      sb.from('enrollments').select('*, courses(*)').eq('user_id',profile.id).eq('status','finished'),
    ]);
    setCerts(c.data||[]); setFinished(e.data||[]); setLoading(false);
  },[profile.id]);
  useEffect(()=>{ load(); },[load]);

  const certCourseIds=new Set(certs.map(c=>c.course_id));
  const eligible=finished.filter(e=>!certCourseIds.has(e.course_id));

  async function computeScore(courseId){
    const { data:mods }=await sb.from('modules').select('id').eq('course_id',courseId);
    const ids=(mods||[]).map(m=>m.id); if(!ids.length) return 85;
    const { data:qz }=await sb.from('quizzes').select('id').in('module_id',ids);
    const qids=(qz||[]).map(q=>q.id); if(!qids.length) return 85;
    const { data:att }=await sb.from('quiz_attempts').select('score,passed,quiz_id').eq('user_id',profile.id).in('quiz_id',qids);
    const passed=(att||[]).filter(a=>a.passed); const pool=passed.length?passed:(att||[]);
    if(!pool.length) return 85;
    return Math.round(pool.reduce((a,x)=>a+x.score,0)/pool.length);
  }
  async function generate(enr){
    setBusyId(enr.id);
    try{
      const score=await computeScore(enr.course_id);
      const { count }=await sb.from('certificates').select('id',{count:'exact',head:true});
      const seq=String((count||0)+1).padStart(4,'0');
      const certNo=`CAM/CERT/${new Date().getFullYear()}/${seq}`;
      const valid=new Date(); valid.setFullYear(valid.getFullYear()+2);
      const row={ user_id:profile.id, course_id:enr.course_id, certificate_number:certNo, recipient_name:profile.name,
        course_title:enr.courses.title, final_score:score, valid_until:valid.toISOString().slice(0,10),
        signed_by_name:'Adi Rachmani', signed_by_title:'Kepala Teknik Tambang PT CAM', status:'issued' };
      const { data, error }=await sb.from('certificates').insert(row).select('*, courses(image_url,category)').single();
      if(error) throw error;
      toast('Sertifikat berhasil diterbitkan!','success'); await load(); setPreview(data);
    }catch(err){ toast(err.message||'Gagal membuat sertifikat','error'); }
    setBusyId(null);
  }

  return <div className="space-y-6">
    <PageHead icon="award" title="Sertifikat Saya" sub="Sertifikat resmi PT CAM, ditandatangani Kepala Teknik Tambang."/>
    {/* eligible to generate */}
    {eligible.length>0 && <div className="space-y-3">
      <h2 className="font-bold text-lg text-cam-ink flex items-center gap-2"><Icon name="spark" size={18} className="text-cam-orange"/> Siap Diterbitkan</h2>
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {eligible.map(e=><Card key={e.id} className="border-2 border-dashed border-cam-orange/40 !bg-cam-orangeSoft/40">
          <div className="flex items-center gap-2"><Badge color="green">Pelatihan Selesai</Badge></div>
          <div className="font-bold text-cam-ink mt-2 clamp-1">{e.courses.title}</div>
          <div className="text-[13px] text-stone-500 mt-0.5">Anda telah menyelesaikan pelatihan ini. Terbitkan sertifikat resmi Anda.</div>
          <Btn className="w-full mt-3" icon="award" loading={busyId===e.id} onClick={()=>generate(e)}>Terbitkan Sertifikat</Btn>
        </Card>)}
      </div>
    </div>}
    {/* issued certs */}
    <div className="space-y-3">
      <h2 className="font-bold text-lg text-cam-ink">Sertifikat Terbit ({certs.length})</h2>
      {loading ? <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">{[1,2,3].map(i=><div key={i} className="skeleton h-52 rounded-2xl"/>)}</div> :
        certs.length===0 ? <Card><Empty icon="award" title="Belum ada sertifikat" sub="Selesaikan pelatihan untuk mendapatkan sertifikat resmi bertanda tangan KTT." /></Card> :
        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {certs.map(c=><Card key={c.id} hover className="!p-0 overflow-hidden card-hover cursor-pointer" >
            <div onClick={()=>setPreview(c)}>
              <div className="h-28 brand-gradient relative grid place-items-center">
                <div className="absolute inset-0 opacity-20 bg-cover bg-center" style={{backgroundImage:`url(${c.courses?.image_url})`}}/>
                <Icon name="award" size={40} className="text-cam-orange relative"/>
                <div className="absolute top-2.5 right-2.5"><Badge className="!bg-white/20 !text-white backdrop-blur">{scoreLabel(c.final_score)}</Badge></div>
              </div>
              <div className="p-4">
                <div className="font-bold text-cam-ink clamp-1">{c.course_title}</div>
                <div className="text-[12px] text-stone-400 font-mono mt-1">{c.certificate_number}</div>
                <div className="flex items-center justify-between mt-3">
                  <div className="text-[12px] text-stone-400"><Icon name="cal" size={12} className="inline mr-1"/>{fmtShort(c.issued_at)}</div>
                  <div className="text-cam-redDark text-sm font-bold flex items-center gap-1">Nilai {c.final_score}</div>
                </div>
              </div>
            </div>
            <div className="px-4 pb-4 flex gap-2"><Btn size="sm" variant="outline" icon="eye" className="flex-1" onClick={()=>setPreview(c)}>Lihat & Unduh</Btn></div>
          </Card>)}
        </div>}
    </div>
    {preview && <CertPreview cert={preview} onClose={()=>setPreview(null)}/>}
  </div>;
}

function TrainerEvaluations({ prefill }){
  const { profile }=useApp();

  const blank={ sel:'', knowledge:80, skill:80, attitude:85, safety:85, recommendation:'competent', strengths:'', improvements:'', notes:'' };
  const [f,setF]=useState(blank); const [saving,setSaving]=useState(false);
  const load=useCallback(async()=>{
    const [fr,er]=await Promise.all([
      sb.from('enrollments').select('*, profiles:user_id(*), courses(*)').eq('status','finished'),
      sb.from('post_training_evaluations').select('*, profiles:user_id(*), courses(*)').order('evaluated_at',{ascending:false}),
    ]);
    setFinished(fr.data||[]); setEvals(er.data||[]); setLoading(false);
  },[]);
  useEffect(()=>{ load(); },[load]);
  useEffect(()=>{ if(prefill?.enrollment_id){ setF(s=>({...s,sel:prefill.enrollment_id})); setOpen(true); } },[prefill]);

  const overall=Math.round((f.knowledge+f.skill+f.attitude+f.safety)/4);
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const selEnr=finished.find(e=>e.id===f.sel);
  const doneKey=new Set(evals.map(e=>e.user_id+'_'+e.course_id));
  const pending=finished.filter(e=>!doneKey.has(e.user_id+'_'+e.course_id));

  async function submit(){
    if(!selEnr){ toast('Pilih peserta & pelatihan','warn'); return; }
    setSaving(true);
    const row={ user_id:selEnr.user_id, course_id:selEnr.course_id, enrollment_id:selEnr.id, trainer_id:profile.id, trainer_name:profile.name,
      knowledge_score:f.knowledge, skill_score:f.skill, attitude_score:f.attitude, safety_score:f.safety, overall_score:overall,
      recommendation:f.recommendation, strengths:f.strengths, improvements:f.improvements, notes:f.notes, evaluated_at:new Date().toISOString() };
    try{
      const { data:exist }=await sb.from('post_training_evaluations').select('id').eq('user_id',selEnr.user_id).eq('course_id',selEnr.course_id).maybeSingle();
      let error;

      else { ({ error }=await sb.from('post_training_evaluations').insert(row)); }

      toast('Evaluasi tersimpan','success'); setOpen(false); setF(blank); await load();
    }catch(err){ toast(err.message||'Gagal menyimpan','error'); }
    setSaving(false);

    <PageHead icon="clip" title="Evaluasi Pasca-Pelatihan" sub="Nilai kompetensi peserta setelah menyelesaikan pelatihan."

    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">

      <Stat icon="clip" label="Sudah Dievaluasi" value={evals.length} color="red"/>
      <Stat icon="alert" label="Menunggu" value={pending.length} color="orange"/>
      <Stat icon="trend" label="Rata-rata" value={evals.length?Math.round(evals.reduce((a,e)=>a+e.overall_score,0)/evals.length):0} color="dark"/>
    </div>

    {pending.length>0 && <Card className="!bg-cam-orangeSoft/40 border-cam-orange/30">
      <div className="font-bold text-cam-ink mb-3 flex items-center gap-2"><Icon name="alert" size={17} className="text-cam-orange"/> Menunggu Evaluasi</div>
      <div className="flex flex-wrap gap-2">{pending.map(e=><button key={e.id} onClick={()=>{setF({...blank,sel:e.id}); setOpen(true);}} className="flex items-center gap-2 bg-white rounded-xl border border-stone-200 px-3 py-2 hover:border-cam-orange transition text-sm">
        <Avatar src={e.profiles?.avatar_url} name={e.profiles?.name} size={28}/><span className="font-semibold text-cam-ink">{e.profiles?.name}</span><span className="text-stone-400">·</span><span className="text-stone-400 clamp-1 max-w-[120px]">{e.courses?.title}</span></button>)}</div>
    </Card>}

    <h2 className="font-bold text-lg text-cam-ink">Riwayat Evaluasi ({evals.length})</h2>
    {loading ? <div className="grid lg:grid-cols-2 gap-4">{[1,2].map(i=><div key={i} className="skeleton h-44 rounded-2xl"/>)}</div> :
      evals.length===0 ? <Card><Empty icon="clip" title="Belum ada evaluasi" sub="Mulai evaluasi peserta yang telah menyelesaikan pelatihan."/></Card> :
      <div className="grid lg:grid-cols-2 gap-4">{evals.map(e=><EvalCard key={e.id} ev={e} showName/>)}</div>}

    <Modal open={open} onClose={()=>setOpen(false)} title="Form Evaluasi Pasca-Pelatihan" icon="clip" size="lg">
      <div className="space-y-4">
        <Field label="Peserta & Pelatihan" required>
          <select className={inputCls} value={f.sel} onChange={e=>set('sel',e.target.value)}>
            <option value="">— Pilih peserta yang telah menyelesaikan pelatihan —</option>
            {finished.map(e=><option key={e.id} value={e.id}>{e.profiles?.name} — {e.courses?.title}</option>)}
          </select>
        </Field>
        {selEnr && <div className="flex items-center gap-3 p-3 rounded-xl bg-stone-50">
          <Avatar src={selEnr.profiles?.avatar_url} name={selEnr.profiles?.name} size={42}/>
          <div><div className="font-bold text-cam-ink">{selEnr.profiles?.name}</div><div className="text-[12.5px] text-stone-400">{selEnr.profiles?.position} · {selEnr.courses?.title}</div></div>
        </div>}
        <div className="grid sm:grid-cols-2 gap-x-6 gap-y-4 p-4 rounded-xl border border-stone-100">

            <span className="font-bold text-cam-ink">Nilai Keseluruhan</span><span className="text-3xl font-extrabold text-cam-redDark">{overall}</span></div>
        </div>
        <Field label="Rekomendasi" required>
          <div className="grid grid-cols-3 gap-2">{Object.entries(REC).map(([k,v])=><button key={k} onClick={()=>set('recommendation',k)} className={cls('px-3 py-2.5 rounded-xl border-2 text-sm font-semibold transition',f.recommendation===k?(k==='competent'?'border-green-500 bg-green-50 text-green-700':k==='need_improvement'?'border-amber-500 bg-amber-50 text-amber-700':'border-red-500 bg-red-50 text-red-700'):'border-stone-200 text-stone-500 hover:border-stone-300')}>{v.label}</button>)}</div>

          <Field label="Area Peningkatan"><textarea className={cls(inputCls,'h-24 resize-none')} value={f.improvements} onChange={e=>set('improvements',e.target.value)} placeholder="cth. Perlu memperdalam prosedur…"/></Field>
        </div>
        <Field label="Catatan Tambahan"><textarea className={cls(inputCls,'h-20 resize-none')} value={f.notes} onChange={e=>set('notes',e.target.value)} placeholder="Rekomendasi tindak lanjut…"/></Field>
        <div className="flex justify-end gap-2 pt-2"><Btn variant="ghost" onClick={()=>setOpen(false)}>Batal</Btn><Btn icon="check" loading={saving} onClick={submit}>Simpan Evaluasi</Btn></div>
      </div>
    </Modal>
  </div>;
}

  useEffect(()=>{ (async()=>{
    const [e,c]=await Promise.all([
      sb.from('enrollments').select('status').eq('user_id',profile.id),
      sb.from('certificates').select('id',{count:'exact',head:true}).eq('user_id',profile.id),

        <div className="text-sm text-stone-400 mt-1">{profile.position||'—'}</div>
        <div className="grid grid-cols-3 gap-2 mt-5 pt-5 border-t border-stone-100">
          {[['Pelatihan',stats.enr],['Selesai',stats.fin],['Sertifikat',stats.cert]].map(([l,v])=><div key={l}><div className="text-2xl font-extrabold text-cam-ink">{v}</div><div className="text-[11px] text-stone-400 font-medium">{l}</div></div>)}

/* ============================ MARKDOWN (lightweight) ============================ */
function MD({ text }){
  const lines=(text||'').split('\n'); const els=[]; let list=null; let k=0;
  const inline=(s)=> s.split(/(\*\*[^*]+\*\*|`[^`]+`)/g).map((p,i)=>{
    if(p.startsWith('**')&&p.endsWith('**')) return <strong key={i} className="font-bold text-cam-ink">{p.slice(2,-2)}</strong>;
    if(p.startsWith('`')&&p.endsWith('`')) return <code key={i} className="px-1.5 py-0.5 rounded bg-stone-100 text-cam-redDark text-[12px] font-mono">{p.slice(1,-1)}</code>;
    return <span key={i}>{p}</span>;
  });
  const flush=()=>{ if(list){ els.push(<ul key={k++} className="list-disc pl-5 space-y-1 my-2">{list}</ul>); list=null; } };
  lines.forEach((ln)=>{ const t=ln.trim();
    if(!t){ flush(); return; }
    if(/^#{1,3}\s/.test(t)){ flush(); const lvl=t.match(/^#+/)[0].length; els.push(<div key={k++} className={cls('font-bold text-cam-ink',lvl===1?'text-lg mt-3 mb-1':'text-[15px] mt-2.5 mb-0.5')}>{inline(t.replace(/^#+\s/,''))}</div>); return; }
    if(/^[-*]\s/.test(t)){ if(!list)list=[]; list.push(<li key={k++} className="text-[13.5px] text-stone-600 leading-relaxed">{inline(t.replace(/^[-*]\s/,''))}</li>); return; }
    if(/^\d+\.\s/.test(t)){ flush(); els.push(<div key={k++} className="flex gap-2 text-[13.5px] text-stone-600 my-1 leading-relaxed"><span className="font-bold text-cam-red shrink-0">{t.match(/^\d+/)[0]}.</span><span>{inline(t.replace(/^\d+\.\s/,''))}</span></div>); return; }
    flush(); els.push(<p key={k++} className="text-[13.5px] text-stone-600 leading-relaxed my-1.5">{inline(t)}</p>);
  }); flush();
  return <div>{els}</div>;
}

/* ============================ ADMIN: TROUBLESHOOTING ============================ */
function TroubleshootTab({ ov, onRefresh }){
  const [log,setLog]=useState([]); const [running,setRunning]=useState(false);
  const push=(m,s='info')=>setLog(l=>[...l,{m,s,t:new Date().toLocaleTimeString('id-ID')}]);
  async function runDiagnostics(){
    setRunning(true); setLog([]); push('Memulai diagnostik sistem…');
    const tables=['profiles','courses','materials','procedures','enrollments','certificates','post_training_evaluations'];
    for(const t of tables){
      const t0=performance.now();
      const { error, count }=await sb.from(t).select('*',{count:'exact',head:true});
      const dt=Math.round(performance.now()-t0);
      if(error) push(`Tabel '${t}': GAGAL — ${error.message}`,'error');
      else push(`Tabel '${t}': OK · ${count} baris · ${dt}ms`, dt<500?'success':'warn');
    }
    const t0=performance.now(); const { error:rpcErr }=await sb.rpc('cam_admin_overview'); const dt=Math.round(performance.now()-t0);
    push(rpcErr?`RPC monitoring: GAGAL — ${rpcErr.message}`:`RPC monitoring: OK · ${dt}ms`, rpcErr?'error':'success');
    const { error:authErr }=await sb.auth.getSession();
    push(authErr?`Sesi Auth: GAGAL`:'Sesi Auth: valid','success');
    push('Diagnostik selesai.','success'); setRunning(false);
  }
  const issues = ov ? [
    { n:ov.integrity.finished_without_certificate, label:'Pelatihan selesai belum bersertifikat', fix:'Peserta dapat menerbitkan sertifikat di menu Sertifikat.', icon:'award' },
    { n:ov.integrity.finished_without_evaluation, label:'Pelatihan selesai belum dievaluasi', fix:'Trainer perlu mengisi evaluasi pasca-pelatihan.', icon:'clip' },
    { n:ov.integrity.materials_without_url, label:'Materi tanpa tautan berkas', fix:'Lengkapi tautan Google Drive di Manajemen Konten.', icon:'file' },
    { n:ov.integrity.procedures_without_doc, label:'Prosedur tanpa dokumen', fix:'Unggah dokumen SOP & tautkan di Manajemen Konten.', icon:'shield' },
  ] : [];
  const sIc={info:'text-stone-400',success:'text-green-600',warn:'text-amber-600',error:'text-red-500'};
  return <div className="space-y-5">
    <div className="grid lg:grid-cols-2 gap-5">
      <Card>
        <div className="flex items-center justify-between mb-3"><h3 className="font-bold text-cam-ink flex items-center gap-2"><Icon name="gauge" size={18} className="text-cam-red"/> Tes Koneksi & Diagnostik</h3>
          <Btn size="sm" icon="refresh" loading={running} onClick={runDiagnostics}>Jalankan Tes</Btn></div>
        <div className="rounded-xl bg-cam-black text-green-300 font-mono text-[12px] p-4 h-64 overflow-y-auto">
          {log.length===0 ? <div className="text-white/30">$ Klik "Jalankan Tes" untuk memulai diagnostik koneksi database & layanan…</div> :
            log.map((l,i)=><div key={i} className="flex gap-2 mb-0.5"><span className="text-white/30 shrink-0">{l.t}</span><span className={sIc[l.s]}>{l.s==='success'?'✓':l.s==='error'?'✕':l.s==='warn'?'⚠':'›'} {l.m}</span></div>)}
        </div>
      </Card>
      <Card>
        <div className="flex items-center justify-between mb-3"><h3 className="font-bold text-cam-ink flex items-center gap-2"><Icon name="alert" size={18} className="text-cam-orange"/> Masalah Terdeteksi</h3>
          <Btn size="sm" variant="outline" icon="refresh" onClick={onRefresh}>Cek</Btn></div>
        <div className="space-y-2.5">
          {issues.map((it,i)=><div key={i} className="flex items-start gap-3 p-3 rounded-xl border border-stone-100">
            <div className={cls('w-9 h-9 rounded-lg grid place-items-center shrink-0',it.n>0?'bg-amber-50 text-amber-600':'bg-green-50 text-green-600')}><Icon name={it.n>0?it.icon:'check'} size={17}/></div>
            <div className="flex-1 min-w-0"><div className="flex items-center gap-2"><span className="font-semibold text-cam-ink text-[13.5px]">{it.label}</span><Badge color={it.n>0?'amber':'green'}>{it.n>0?`${it.n}`:'OK'}</Badge></div>
              {it.n>0 && <div className="text-[12px] text-stone-400 mt-1">{it.fix}</div>}</div></div>)}
          {issues.every(i=>i.n===0) && <div className="text-center py-6 text-green-600"><Icon name="checkC" size={32} className="mx-auto"/><div className="font-semibold mt-2">Tidak ada masalah integritas data 🎉</div></div>}
        </div>
      </Card>
    </div>
  </div>;
}

function ManageMaterials(){

  useEffect(()=>{ load(); },[]);

    <div className="flex items-center justify-between mb-4"><h3 className="font-bold text-cam-ink">Materi & Video ({mats.length})</h3><Btn size="sm" icon="plus" onClick={()=>{setF(blank);setOpen(true);}}>Tambah</Btn></div>
    <div className="space-y-1.5 max-h-[460px] overflow-y-auto">
      {mats.map(m=>{ const meta=MAT[m.type]||MAT.link; return <div key={m.id} className="flex items-center gap-3 p-2.5 rounded-xl hover:bg-stone-50 border border-stone-50">
        <div className={cls('w-9 h-9 rounded-lg grid place-items-center shrink-0',meta.tint)}><Icon name={meta.icon} size={17}/></div>
        <div className="flex-1 min-w-0"><div className="font-semibold text-[13.5px] text-cam-ink clamp-1">{m.title}</div><div className="text-[11.5px] text-stone-400">{meta.label} · {m.courses?.title||'Umum'}</div></div>

        <div className="grid sm:grid-cols-2 gap-3">

/* ============================ ADMIN PANEL SHELL ============================ */
function AdminPanel(){
  const [tab,setTab]=useState('monitoring');
  const [ov,setOv]=useState(null); const [err,setErr]=useState(null); const [latency,setLatency]=useState(null);
  const load=useCallback(async()=>{ const { data,error }=await sb.rpc('cam_admin_overview'); if(error) setErr(error.message); else { setOv(data); setErr(null); } },[]);
  const ping=useCallback(async()=>{ const t=performance.now(); await sb.from('app_settings').select('key').limit(1); setLatency(Math.round(performance.now()-t)); },[]);
  useEffect(()=>{ load(); ping(); const id=setInterval(ping,6000); return ()=>clearInterval(id); },[load,ping]);
  const tabs=[['monitoring','Monitoring','gauge'],['security','Keamanan','shield'],['troubleshoot','Troubleshooting','alert'],['ai','Asisten AI','spark'],['content','Manajemen Konten','layers']];
  return <div className="space-y-6">
    <PageHead icon="server" title="Panel Administrator" sub="Monitoring server, keamanan, troubleshooting & analisa AI — khusus admin."
      action={<Badge color="red" className="!px-3 !py-2"><Icon name="lock" size={13}/> Akses Terbatas</Badge>}/>
    {err && <Card className="!bg-red-50 border-red-200"><div className="flex items-center gap-2 text-red-700 text-sm font-semibold"><Icon name="alert" size={18}/> {err}</div></Card>}
    <div className="flex gap-1.5 p-1.5 bg-white rounded-2xl border border-stone-100 overflow-x-auto">
      {tabs.map(([id,l,ic])=><button key={id} onClick={()=>setTab(id)} className={cls('flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold whitespace-nowrap transition',tab===id?'red-orange text-white shadow-glow':'text-stone-500 hover:bg-stone-50')}>
        <Icon name={ic} size={17}/>{l}{id==='ai'&&<Icon name="spark" size={13} className={tab===id?'text-white':'text-cam-orange'}/>}</button>)}
    </div>
    {tab==='monitoring' && <MonitoringTab ov={ov} latency={latency} onRefresh={()=>{load();ping();}}/>}
    {tab==='security' && <SecurityTab ov={ov} onRefresh={load}/>}
    {tab==='troubleshoot' && <TroubleshootTab ov={ov} onRefresh={load}/>}
    {tab==='ai' && <AITab ov={ov}/>}
    {tab==='content' && <ContentTab/>}
  </div>;
}

/* ============================ SPLASH ============================ */
function Splash({ msg='Memuat CAM Learning Center…', onSignOut }){
  return <div className="min-h-screen brand-gradient grid place-items-center text-white">
    <div className="text-center animate-fadeIn">
      <div className="bg-white rounded-2xl px-5 py-4 inline-flex shadow-2xl floaty"><Logo h={44}/></div>
      <div className="mt-6 flex items-center justify-center gap-3 text-white/80"><Spinner size={20}/> <span className="font-medium">{msg}</span></div>
      {onSignOut && <button onClick={onSignOut} className="mt-4 text-sm text-white/60 hover:text-white underline">Keluar</button>}

/* ============================ PAGE ROUTER ============================ */
function renderPage(view, profile){
  switch(view.page){
    case 'dashboard':    return <Dashboard/>;
    case 'courses':      return <Courses/>;
    case 'course':       return <CourseDetail courseId={view.params.id}/>;
    case 'library':      return <Library/>;
    case 'procedures':   return <Procedures/>;
    case 'certificates': return <Certificates/>;
    case 'evaluations':  return <Evaluations/>;
    case 'profile':      return <Profile/>;
    case 'admin':        return profile.role==='admin' ? <AdminPanel/> : <Dashboard/>;
    default:             return <Dashboard/>;
  }
}

/* ============================ APP ROOT ============================ */
function App(){
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [settings,setSettings]=useState({});
  const [signatory,setSignatory]=useState(null);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState({ page:'dashboard', params:{} });

  const loadProfile=async(uid)=>{ const { data }=await sb.from('profiles').select('*').eq('id',uid).single(); return data; };
  const bootstrap=async(sess)=>{
    if(!sess){ setProfile(null); setLoading(false); return; }
    try{
      const prof=await loadProfile(sess.user.id); setProfile(prof);
      const [{ data:st },{ data:sg }]=await Promise.all([
        sb.from('app_settings').select('*'),
        sb.from('signatories').select('*').eq('is_active',true).order('created_at').limit(1).maybeSingle(),
      ]);
      const map={}; (st||[]).forEach(r=>map[r.key]=r.value); setSettings(map); setSignatory(sg);
    }catch(e){ console.error(e); }
    setLoading(false);
  };
  useEffect(()=>{
    sb.auth.getSession()
      .then(({ data })=>{ setSession(data.session); bootstrap(data.session); })
      .catch(err=>{ console.error('getSession failed:', err); setSession(null); setLoading(false); });
    const { data:sub }=sb.auth.onAuthStateChange((_e,sess)=>{
      setSession(sess);
      if(sess){ setLoading(true); bootstrap(sess); }
      else { setProfile(null); setView({ page:'dashboard', params:{} }); setLoading(false); }
    });
    return ()=>sub.subscription.unsubscribe();
  },[]);

  const refreshProfile=async()=>{ if(session) setProfile(await loadProfile(session.user.id)); };
  const go=(page,params={})=>{ setView({ page, params }); window.scrollTo(0,0); };
  const signOut=async()=>{ await sb.auth.signOut(); toast('Anda telah keluar','info'); };

  if(loading) return <Splash/>;
  if(!session) return <Login/>;
  if(!profile) return <Splash msg="Memuat profil…" onSignOut={signOut}/>;

  const ctx={ session, email:session.user.email, profile, settings, signatory, view, go, refreshProfile, signOut };
  return <AppCtx.Provider value={ctx}><Shell>{renderPage(view, profile)}</Shell></AppCtx.Provider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
